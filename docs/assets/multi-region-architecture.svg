<svg xmlns="http://www.w3.org/2000/svg" width="860" height="490" viewBox="0 0 860 490" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Internet -->
  <rect x="330" y="12" width="200" height="44" rx="8" fill="#e8f4fb" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="430" y="39" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Internet</text>

  <!-- Internet → Route 53 -->
  <line x1="430" y1="56" x2="430" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Route 53 -->
  <rect x="305" y="80" width="250" height="54" rx="8" fill="#e8f8ec" stroke="#3d9970" stroke-width="1.5"/>
  <text x="430" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Route 53</text>
  <text x="430" y="125" text-anchor="middle" font-size="11" fill="#555">latency-based routing</text>

  <!-- Route 53 → us-east-1 ALB -->
  <path d="M 430,134 C 430,158 205,158 205,192" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Route 53 → eu-west-1 ALB -->
  <path d="M 430,134 C 430,158 655,158 655,192" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── us-east-1 region box ── -->
  <rect x="15" y="148" width="380" height="322" rx="10" fill="#fafafa" stroke="#aaa" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="205" y="168" text-anchor="middle" font-size="11" fill="#888" letter-spacing="1">us-east-1</text>

  <!-- us-east-1: ALB -->
  <rect x="55" y="192" width="300" height="48" rx="6" fill="#fff8ec" stroke="#f5a623" stroke-width="1.5"/>
  <text x="205" y="221" text-anchor="middle" font-size="13" fill="#1a1a1a">Application Load Balancer</text>

  <!-- us-east-1: ALB → EC2 -->
  <line x1="205" y1="240" x2="205" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- us-east-1: ASG / EC2 -->
  <rect x="55" y="278" width="300" height="56" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="205" y="306" text-anchor="middle" font-size="13" fill="#1a1a1a">EC2 × N</text>
  <text x="205" y="323" text-anchor="middle" font-size="10" fill="#555">Auto Scaling Group · CloudWatch</text>

  <!-- us-east-1: EC2 → ElastiCache -->
  <line x1="205" y1="334" x2="205" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- us-east-1: ElastiCache -->
  <rect x="55" y="372" width="300" height="48" rx="6" fill="#fdecea" stroke="#e53935" stroke-width="1.5"/>
  <text x="205" y="401" text-anchor="middle" font-size="13" fill="#1a1a1a">ElastiCache Redis</text>

  <!-- ── eu-west-1 region box ── -->
  <rect x="465" y="148" width="380" height="322" rx="10" fill="#fafafa" stroke="#aaa" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="655" y="168" text-anchor="middle" font-size="11" fill="#888" letter-spacing="1">eu-west-1</text>

  <!-- eu-west-1: ALB -->
  <rect x="505" y="192" width="300" height="48" rx="6" fill="#fff8ec" stroke="#f5a623" stroke-width="1.5"/>
  <text x="655" y="221" text-anchor="middle" font-size="13" fill="#1a1a1a">Application Load Balancer</text>

  <!-- eu-west-1: ALB → EC2 -->
  <line x1="655" y1="240" x2="655" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- eu-west-1: ASG / EC2 -->
  <rect x="505" y="278" width="300" height="56" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="655" y="306" text-anchor="middle" font-size="13" fill="#1a1a1a">EC2 × N</text>
  <text x="655" y="323" text-anchor="middle" font-size="10" fill="#555">Auto Scaling Group · CloudWatch</text>

  <!-- eu-west-1: EC2 → ElastiCache -->
  <line x1="655" y1="334" x2="655" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- eu-west-1: ElastiCache -->
  <rect x="505" y="372" width="300" height="48" rx="6" fill="#fdecea" stroke="#e53935" stroke-width="1.5"/>
  <text x="655" y="401" text-anchor="middle" font-size="13" fill="#1a1a1a">ElastiCache Redis</text>
</svg>
