<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">URL Safety Checker request flow</title>
  <desc id="desc">An HTTP proxy sends a blocking URL lookup request to the URL Safety Checker API. The service normalizes the URL, checks an in-memory malware URL set loaded from a local file, and returns a JSON verdict.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.5; filter: url(#shadow); }
      .api { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; filter: url(#shadow); }
      .logic { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; filter: url(#shadow); }
      .data { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; filter: url(#shadow); }
      .verdict { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.5; filter: url(#shadow); }
      .title { fill: #0f172a; font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #475569; font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #64748b; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .code { fill: #334155; font: 500 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .arrow { stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .data-arrow { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .badge { fill: #0f172a; }
      .badge-n { fill: #ffffff; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>

  <text x="72" y="72" class="title">URL Safety Checker</text>
  <text x="72" y="104" class="subtitle">Blocking URL reputation lookup for an HTTP proxy, backed by a local malware URL dataset.</text>

  <rect x="72" y="160" width="196" height="132" rx="18" class="card"/>
  <circle cx="90" cy="178" r="14" class="badge"/><text x="90" y="178" class="badge-n">1</text>
  <text x="104" y="203" class="label">HTTP Proxy</text>
  <text x="104" y="234" class="body">traffic gatekeeper</text>
  <text x="104" y="260" class="small">waits for a verdict</text>

  <rect x="340" y="148" width="230" height="156" rx="18" class="api"/>
  <circle cx="358" cy="166" r="14" class="badge"/><text x="358" y="166" class="badge-n">2</text>
  <text x="372" y="193" class="label">Lookup API</text>
  <text x="372" y="224" class="body">validates method</text>
  <text x="372" y="248" class="body">parses route shape</text>
  <text x="372" y="276" class="code">GET /urlinfo/1/...</text>

  <rect x="642" y="148" width="238" height="156" rx="18" class="logic"/>
  <circle cx="660" cy="166" r="14" class="badge"/><text x="660" y="166" class="badge-n">3</text>
  <text x="674" y="193" class="label">URL Normalization</text>
  <text x="674" y="224" class="body">lowercase host</text>
  <text x="674" y="248" class="body">preserve port/path/query</text>
  <text x="674" y="276" class="small">scheme-less lookup key</text>

  <rect x="954" y="148" width="238" height="156" rx="18" class="verdict"/>
  <circle cx="972" cy="166" r="14" class="badge"/><text x="972" y="166" class="badge-n">4</text>
  <text x="986" y="193" class="label">Verdict Engine</text>
  <text x="986" y="224" class="body">exact-match check</text>
  <text x="986" y="248" class="body">safe or malicious</text>
  <text x="986" y="276" class="small">HTTP 200 for verdicts</text>

  <rect x="420" y="420" width="260" height="124" rx="18" class="data"/>
  <circle cx="438" cy="438" r="14" class="badge"/><text x="438" y="438" class="badge-n">5</text>
  <text x="452" y="465" class="label">Local Dataset File</text>
  <text x="452" y="496" class="code">data/malware_urls.txt</text>
  <text x="452" y="522" class="body">normalized URLs</text>

  <rect x="806" y="420" width="260" height="124" rx="18" class="data"/>
  <circle cx="824" cy="438" r="14" class="badge"/><text x="824" y="438" class="badge-n">5</text>
  <text x="838" y="465" class="label">Malware URL Set</text>
  <text x="838" y="496" class="body">in-memory map</text>
  <text x="838" y="522" class="body">loaded at startup</text>

  <rect x="505" y="590" width="270" height="86" rx="18" class="card"/>
  <circle cx="523" cy="608" r="14" class="badge"/><text x="523" y="608" class="badge-n">6</text>
  <text x="537" y="626" class="label">JSON Verdict</text>
  <text x="537" y="654" class="code">safe | malicious</text>

  <line x1="268" y1="226" x2="340" y2="226" class="arrow"/>
  <line x1="570" y1="226" x2="642" y2="226" class="arrow"/>
  <line x1="880" y1="226" x2="954" y2="226" class="arrow"/>
  <path d="M1073 304C1073 366 1035 396 970 420" class="arrow"/>
  <line x1="680" y1="482" x2="806" y2="482" class="data-arrow"/>
  <path d="M806 482C720 510 666 545 640 590" class="arrow"/>
  <path d="M505 633C350 610 230 480 170 292" class="arrow"/>

  <text x="286" y="203" class="small">blocking check</text>
  <text x="586" y="203" class="small">extract key</text>
  <text x="902" y="203" class="small">lookup</text>
  <text x="710" y="462" class="small">startup load</text>
  <text x="318" y="612" class="small">allow/block decision</text>
</svg>
